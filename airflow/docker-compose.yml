x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: airflow/Dockerfile
    args:
      AIRFLOW_BASE_IMAGE: ${AIRFLOW_BASE_IMAGE:-apache/airflow:2.9.1}
      DATAFORM_CLI_VERSION: ${DATAFORM_CLI_VERSION:-latest}
  image: ${AIRFLOW_DOCKER_IMAGE:-financial-risk-airflow:2.9.1-dataform}
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW_EXECUTOR:-LocalExecutor}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres/${POSTGRES_DB:-airflow}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: ${AIRFLOW_DAGS_ARE_PAUSED_AT_CREATION:-true}
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW_LOAD_EXAMPLES:-false}
    AIRFLOW__API__AUTH_BACKENDS: ${AIRFLOW_API_AUTH_BACKENDS:-airflow.api.auth.backend.basic_auth}
    CMF_API_KEY: ${CMF_API_KEY}
    GCP_PROJECT_ID: ${GCP_PROJECT_ID}
    GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
    GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/opt/airflow/keys/airflow-sa-key.json}
    DATAFORM_PROJECT_DIR: ${DATAFORM_PROJECT_DIR:-/opt/airflow/dataform}
    DATAFORM_RUNTIME_PROJECT_DIR: ${DATAFORM_RUNTIME_PROJECT_DIR:-/tmp/dataform-runtime}
    DATAFORM_CREDENTIALS_FILE: ${DATAFORM_CREDENTIALS_FILE:-/tmp/dataform-runtime/.df-credentials.json}
    BQ_RAW_SCHEMA: ${BQ_RAW_SCHEMA:-financial_risk_raw}
    BQ_SILVER_SCHEMA: ${BQ_SILVER_SCHEMA:-financial_risk_silver}
    BQ_GOLD_SCHEMA: ${BQ_GOLD_SCHEMA:-financial_risk_gold}
    DATAFORM_DEFAULT_DATASET: ${DATAFORM_DEFAULT_DATASET:-financial_risk_gold}
    DATAFORM_DEFAULT_LOCATION: ${DATAFORM_DEFAULT_LOCATION:-US}
    DATAFORM_ASSERTION_DATASET: ${DATAFORM_ASSERTION_DATASET:-financial_risk_assertions}
    DATAFORM_CORE_VERSION: ${DATAFORM_CORE_VERSION:-3.0.0}
    AIRFLOW_DAG_OWNER: ${AIRFLOW_DAG_OWNER:-airflow}
    AIRFLOW_DAG_START_DATE: ${AIRFLOW_DAG_START_DATE:-2024-01-01T00:00:00}
    AIRFLOW_DAG_SCHEDULE: ${AIRFLOW_DAG_SCHEDULE:-0 6 1 * *}
    AIRFLOW_DAG_CATCHUP: ${AIRFLOW_DAG_CATCHUP:-false}
    AIRFLOW_DAG_RETRIES: ${AIRFLOW_DAG_RETRIES:-3}
    AIRFLOW_DAG_RETRY_DELAY_MINUTES: ${AIRFLOW_DAG_RETRY_DELAY_MINUTES:-5}
    CMF_REPORTING_LAG_MONTHS: ${CMF_REPORTING_LAG_MONTHS:-2}
    PYTHONPATH: ${PYTHONPATH:-/opt/airflow/src}
  volumes:
    - ./dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ../keys:/opt/airflow/keys
    - ../src:/opt/airflow/src
    - ../dataform:/opt/airflow/dataform
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:13}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-airflow}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8080}:${AIRFLOW_INTERNAL_WEBSERVER_PORT:-8080}"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:${AIRFLOW_INTERNAL_WEBSERVER_PORT:-8080}/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:${AIRFLOW_SCHEDULER_HEALTH_CHECK_PORT:-8974}/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate

        airflow users create \
          --username "${AIRFLOW_ADMIN_USERNAME:-admin}" \
          --firstname "${AIRFLOW_ADMIN_FIRSTNAME:-Local}" \
          --lastname "${AIRFLOW_ADMIN_LASTNAME:-Admin}" \
          --role "${AIRFLOW_ADMIN_ROLE:-Admin}" \
          --email "${AIRFLOW_ADMIN_EMAIL:-admin@example.com}" \
          --password "${AIRFLOW_ADMIN_PASSWORD:-admin}" || true

        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/logs
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
    user: "0:0"

volumes:
  postgres-db-volume:
  airflow-logs:
